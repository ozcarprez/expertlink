<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro - ExpertLink</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#a0f399",
                    "primary-fixed": "#d4e3ff",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "on-primary-fixed": "#001c39",
                    "on-secondary-container": "#217128",
                    "tertiary-container": "#b81c20",
                    "on-secondary-fixed": "#002204",
                    "on-primary-fixed-variant": "#004883",
                    "surface-tint": "#1960a6",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed": "#410003",
                    "tertiary-fixed": "#ffdad6",
                    "surface-bright": "#f8f9fb",
                    "secondary": "#1b6d24",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#c1d9ff",
                    "surface-container-high": "#e6e8ea",
                    "primary-container": "#185fa5",
                    "outline": "#727782",
                    "tertiary": "#92000e",
                    "surface-container-highest": "#e0e3e5",
                    "on-tertiary-fixed-variant": "#93000e",
                    "surface-variant": "#e0e3e5",
                    "on-secondary-fixed-variant": "#005312",
                    "surface-container": "#eceef0",
                    "on-surface-variant": "#424751",
                    "secondary-fixed-dim": "#88d982",
                    "primary": "#004782",
                    "on-surface": "#191c1e",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#a3f69c",
                    "inverse-surface": "#2d3133",
                    "background": "#f8f9fb",
                    "on-background": "#191c1e",
                    "tertiary-fixed-dim": "#ffb4ac",
                    "outline-variant": "#c2c6d2",
                    "surface-dim": "#d8dadc",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#eff1f3",
                    "on-tertiary-container": "#ffccc6",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#a4c9ff",
                    "inverse-primary": "#a4c9ff",
                    "error": "#ba1a1a",
                    "surface": "#f8f9fb"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="bg-[#f8f9fb]/80 dark:bg-[#191c1e]/80 backdrop-blur-md fixed top-0 w-full z-50">
<div class="flex items-center px-5 h-16 w-full max-w-md mx-auto">
<button class="mr-4 p-2 rounded-full hover:bg-[#f2f4f6] dark:hover:bg-[#44474e] transition-colors active:scale-95 duration-200 ease-in-out text-[#004782] dark:text-[#c1d9ff]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="Manrope display-sm font-bold tracking-tight text-[#004782] dark:text-[#c1d9ff]">Registro</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-12 px-6 w-full max-w-md mx-auto">
<!-- Hero Visual / Brand Moment -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-surface-container-low mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person_add</span>
</div>
<h2 class="text-2xl font-extrabold text-on-surface tracking-tight mb-2">Únete a ExpertLink</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">Conéctate con los mejores expertos y profesionales en un solo lugar.</p>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-outline px-1" for="full_name">Nombre completo</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-5 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="full_name" placeholder="Ej. Juan Pérez" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline-variant group-focus-within:text-primary">
<span class="material-symbols-outlined text-[20px]">badge</span>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-outline px-1" for="email">Correo electrónico</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-5 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="email" placeholder="nombre@ejemplo.com" type="email"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-outline-variant group-focus-within:text-primary">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-outline px-1" for="password">Contraseña</label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-5 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/50 focus:bg-surface-container-lowest transition-all duration-200 outline-none" id="password" placeholder="Mínimo 8 caracteres" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<a class="w-full h-14 bg-primary-container text-on-primary font-bold rounded-full shadow-[0_8px_16px_rgba(24,95,165,0.2)] active:scale-[0.98] transition-all flex items-center justify-center space-x-2" href="explorar.html">
<span>Crear cuenta</span>
<span class="material-symbols-outlined">arrow_forward</span>
</a>
</div>
</form>
<!-- Terms & Privacy -->
<p class="mt-8 text-center text-xs text-on-surface-variant leading-relaxed">
            Al registrarte, aceptas nuestros <a class="text-primary font-semibold underline underline-offset-2" href="#">Términos de Servicio</a> y <a class="text-primary font-semibold underline underline-offset-2" href="#">Política de Privacidad</a>.
        </p>
<!-- Footer Link -->
<footer class="mt-12 text-center">
<p class="text-on-surface-variant text-sm">
                ¿Ya tienes una cuenta? 
                <a class="text-[#004782] font-bold ml-1 hover:underline underline-offset-4 decoration-2" href="#">Iniciar sesión</a>
</p>
</footer>
</main>
<!-- Visual Accent Element -->
<div class="fixed top-0 right-0 -z-10 opacity-10 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="300" cy="100" fill="url(#paint0_linear)" r="200"></circle>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint0_linear" x1="100" x2="300" y1="100" y2="300">
<stop stop-color="#185FA5"></stop>
<stop offset="1" stop-color="#185FA5" stop-opacity="0"></stop>
</lineargradient>
</defs>
</svg>
</div>
</body></html>
